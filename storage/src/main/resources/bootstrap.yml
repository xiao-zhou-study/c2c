server:
  port: 8086  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: storage-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - data-id: shared-feign.yaml # 共享feign配置
            refresh: false
        namespace: 66f565f6-6b64-408c-a3c3-8f30ce3b6711
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

# 文件上传配置
file:
  upload:
    base-path: /usr/myprojects/image  # 云服务器上的存储路径
    url-prefix: http://117.72.74.175/images
    max-size: 50
    allowed-types: jpg,jpeg,png,gif,bmp,webp,mp4,avi,pdf,doc,docx,xls,xlsx
    # SFTP云服务器连接配置
    sftp:
      host: 117.72.74.175        # 云服务器IP地址
      port: 22                    # SSH端口，默认22
      username: root              # 登录用户名
      password: zhou0403..     # 登录密码
      timeout: 30000              # 连接超时时间(毫秒)

xy:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.aynu.storage.controller
    title: 校园物品共享平台 - 用户中心接口文档
    description: 该服务用户管理、用户信息管理
    contact-name: 安阳师范学院
    version: v1.0
  auth:
    resource:
      enable: true
      excludeLoginPaths:
        - /students/register
        - /users/detail/{isStaff}
        - /users/list
        - GET:/users/{id}
        - /users/{id}/type
        - /users/ids
        - /users/me
  jdbc:
    database: xy_storage