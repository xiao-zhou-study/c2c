server:
  port: 8086  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: storage-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - data-id: shared-feign.yaml # 共享feign配置
            refresh: false
        namespace: 66f565f6-6b64-408c-a3c3-8f30ce3b6711
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

# 文件上传配置
file:
  upload:
    base-path: /usr/myprojects/image  # 云服务器上的存储路径
    url-prefix: http://117.72.74.175/images
    max-size: 50
    allowed-types: jpg,jpeg,png,gif,bmp,webp,mp4,avi,pdf,doc,docx,xls,xlsx
s3:
  # 1. 访问密钥 ID
  access-key-id: "e6b6ac74e91459f5e6ae01580e4a5e40"
  # 2. 机密访问密钥
  secret-access-key: "935b02c6af7d6b5447c5d855cfdd0d6c67bea246586a56b6ae5a1672c6fbbd96"
  # 3. 存储桶名称
  bucket-name: "xywpgx"
  # 4. 终结点
  endpoint: "https://be60480ad0a841ee6aaecbb06703af4c.r2.cloudflarestorage.com"
  # 5. 区域 (R2 统一使用 auto)
  region: auto
  # 6. 访问前缀
  url-prefix: "https://zmwlovefmn.uk"
  # 7. 路径样式访问 (R2 建议开启)
  path-style-access-enabled: true
  # 8. 业务限制
  max-size: 50
  allowed-types: jpg,jpeg,png,gif,bmp,webp,mp4,avi,pdf,doc,docx,xls,xlsx

xy:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.aynu.storage.controller
    title: 校园物品共享平台 - 用户中心接口文档
    description: 该服务用户管理、用户信息管理
    contact-name: 安阳师范学院
    version: v1.0
  auth:
    resource:
      enable: true
      excludeLoginPaths:
        - /students/register
        - /users/detail/{isStaff}
        - /users/list
        - GET:/users/{id}
        - /users/{id}/type
        - /users/ids
        - /users/me
  jdbc:
    database: xy_storage