services:
  gateway:
    build: ./gateway
    container_name: xywpgx-gateway
    ports:
      - "10010:10010"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 768M  # JVM 512 + 256 预留
    networks:
      - xywpgx-network
    restart: unless-stopped

  auth:
    build: ./auth/auth-service
    container_name: xywpgx-auth
    ports:
      - "8081:8081"
    environment:
      - JAVA_OPTS=-Xms384m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 1G    # JVM 768 + 256 预留
    networks:
      - xywpgx-network
    restart: unless-stopped

  user:
    build: ./user
    container_name: xywpgx-user
    ports:
      - "8082:8082"
    environment:
      - JAVA_OPTS=-Xms384m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - xywpgx-network
    restart: unless-stopped

  item:
    build: ./item
    container_name: xywpgx-item
    ports:
      - "8083:8083"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - xywpgx-network
    restart: unless-stopped

  order:
    build: ./order
    container_name: xywpgx-order
    ports:
      - "8084:8084"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - xywpgx-network
    restart: unless-stopped

  notification:
    build: ./notification
    container_name: xywpgx-notification
    ports:
      - "8085:8085"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - xywpgx-network
    restart: unless-stopped

  storage:
    build: ./storage
    container_name: xywpgx-storage
    ports:
      - "8086:8086"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - xywpgx-network
    restart: unless-stopped

  review:
    build: ./review
    container_name: xywpgx-review
    ports:
      - "8087:8087"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - xywpgx-network
    restart: unless-stopped

networks:
  xywpgx-network:
    driver: bridge