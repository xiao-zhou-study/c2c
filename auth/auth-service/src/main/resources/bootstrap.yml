server:
  port: 8081  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: auth-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - dataId: shared-mq.yaml # 共享mq配置
          - dataId: shared-xxljob.yaml # 共享mq配置
        namespace: 66f565f6-6b64-408c-a3c3-8f30ce3b6711

encrypt:
  key-store:
    alias: tjxt  #别名
    location: classpath:tjxt.jks  #KeyStore 证书库名称
    password: tj123321   #证书库密码
    secret: tj123321   #秘钥
xy:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.aynu.auth.controller
    title: 校园物品共享平台 - 权限微服务接口文档
    description: 该服务用于管理权限相关信息
    contact-name: 安阳师范学院
    version: v1.0
  auth:
    resource:
      enable: true
      includeLoginPaths:
        - /menus/me
        - /accounts/logout
  jdbc:
    database: xy_auth