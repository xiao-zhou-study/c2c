server:
  port: 8085  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: notification-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        timeout: 10000
        config-retry-time: 3000
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - data-id: shared-feign.yaml # 共享feign配置
            refresh: false
xy:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.aynu.notification.controller
    title: 校园物品共享平台 - 通知管理接口文档
    description: 该服务用于通知管理、通知信息管理
    contact-name: 安阳师范学院
    version: v1.0
  auth:
    resource:
      enable: true
      excludeLoginPaths: []
  jdbc:
    database: xy_notification
