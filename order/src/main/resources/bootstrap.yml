server:
  port: 8084  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: order-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        timeout: 10000
        config-retry-time: 3000
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - data-id: shared-feign.yaml # 共享feign配置
            refresh: false
          - data-id: shared-mq.yaml # 共享mq配置
xy:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.aynu.order.controller
    title: 校园物品共享平台 - 订单管理接口文档
    description: 该服务用于订单管理、订单信息管理
    contact-name: 安阳师范学院
    version: v1.0
  auth:
    resource:
      enable: true
      excludeLoginPaths:
        - /borrow_orders/notify

  jdbc:
    database: xy_order

alipay:
  privateKey: ""
  alipayPublicKey: ""
  appId: "9021000144676990"