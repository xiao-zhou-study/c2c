server:
  port: 8083  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: item-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - data-id: shared-feign.yaml # 共享feign配置
            refresh: false
          - data-id: shared-qiniu.yaml # 共享七牛云配置
        namespace: 95d88ea9-11b0-4a70-8cab-688fab84f639
xy:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.aynu.item.controller
    title: 校园物品共享平台 - 物品管理接口文档
    description: 该服务用于物品管理、物品信息管理
    contact-name: 安阳师范学院
    version: v1.0
  auth:
    resource:
      enable: true
      excludeLoginPaths:
        - GET:/categories
        - GET:/items/{id}
        - GET:/items/recommended
        - GET:/items/hot
  jdbc:
    database: xy_item