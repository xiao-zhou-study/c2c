server:
  port: 10010  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: gateway-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
    gateway:
      routes:
        - id: as
          uri: lb://auth-service
          predicates:
            - Path=/as/**
          filters:
            - PreserveHostHeader
        - id: us
          uri: lb://user-service
          predicates:
            - Path=/us/**
        # 商品服务路由
        - id: item
          uri: lb://item-service
          predicates:
            - Path=/is/**
          filters:
            - PreserveHostHeader
        # 订单服务路由
        - id: order
          uri: lb://order-service
          predicates:
            - Path=/orders/**
          filters:
            - PreserveHostHeader
        # 存储服务路由
        - id: storage
          uri: lb://storage-service
          predicates:
            - Path=/storages/**
          filters:
            - PreserveHostHeader
        # 评价服务路由
        - id: review
          uri: lb://review-service
          predicates:
            - Path=/reviews/**
          filters:
            - PreserveHostHeader
        # 通知服务路由
        - id: notification
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - PreserveHostHeader
      default-filters:
        - StripPrefix=1
      globalcors: # 全局的跨域处理
        add-to-simple-url-handler-mapping: true # 解决options请求被拦截问题
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: # 允许哪些网站的跨域请求
              - "*"
            allowedMethods: # 允许的跨域ajax的请求方式
              - "GET"
              - "POST"
              - "DELETE"
              - "PUT"
              - "OPTIONS"
            allowedHeaders: "*" # 允令在请求中携带的头信息
            allowCredentials: true # 是否允许携带cookie
            maxAge: 360000 # 这次跨域检测的有效期

logging:
  level:
    com.aynu: debug