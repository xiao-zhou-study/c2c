server:
  port: 10010  # 端口
  netty:
    connection-timeout: 5s # 优化连接超时

spring:
  profiles:
    active: dev
  application:
    name: gateway-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml
            refresh: false
          - data-id: shared-redis.yaml
            refresh: false
          - data-id: shared-logs.yaml
            refresh: false
    gateway:
      routes:
        - id: as
          uri: lb://auth-service
          predicates:
            - Path=/as/**
          filters:
            - PreserveHostHeader
        - id: us
          uri: lb://user-service
          predicates:
            - Path=/us/**
        # 商品服务路由
        - id: item
          uri: lb://item-service
          predicates:
            - Path=/is/**
          filters:
            - PreserveHostHeader
        # 订单服务路由
        - id: order
          uri: lb://order-service
          predicates:
            - Path=/os/**
          filters:
            - PreserveHostHeader
        # 存储服务路由
        - id: storage
          uri: lb://storage-service
          predicates:
            - Path=/ss/**
          filters:
            - PreserveHostHeader
        # 评价服务路由
        - id: review
          uri: lb://review-service
          predicates:
            - Path=/rs/**
          filters:
            - PreserveHostHeader
        # 通知服务路由
        - id: notification
          uri: lb://notification-service
          predicates:
            - Path=/ns/**
          filters:
            - PreserveHostHeader
      default-filters:
        - StripPrefix=1

logging:
  level:
    com.aynu: debug