version: '3.8'

services:
  ai:
    build: .
    container_name: xywpgx-ai
    ports:
      - "8088:8088"
    environment:
      # 适当调小 Xmx，留出更多空间给 ONNX 的原生内存 (Native Memory)
      - JAVA_OPTS=-Xms256m -Xmx400m -XX:+UseParallelGC -XX:TieredStopAtLevel=1 -Duser.timezone=Asia/Shanghai
      - SPRING_CLOUD_NACOS_CONFIG_USERNAME=nacos
      - SPRING_CLOUD_NACOS_CONFIG_PASSWORD=zhoujiadayuan
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=nacos
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=zhoujiadayuan
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M  # 提高到 1.5G，确保 AI 模型能完全加载
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - micro-net
    restart: unless-stopped

networks:
  micro-net:
    external: true